<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJS Skillbuilder guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SKILLBUILDER GUIDE <span class="title-jjs">JJS</span></h1>
    </header>

    <div class="split" id="splitPanel">
        <div class="split-inner">
            <h2 id="splitTitle">Select an icon from the left panel</h2>
            <p id="splitSubtitle" class="split-subtitle">
                Content for each skill page opens here, in the right panel.
            </p>
            <section id="splitSections" class="split-sections"></section>
            <div class="free-wrap">
                <div id="splitFreeCanvas" class="free-canvas"></div>
            </div>
        </div>
    </div>

    <aside class="icon-panel">
        <section class="icon-list" id="iconList"></section>
    </aside>

    <script src="editor-gate.js"></script>
    <script src="page.js"></script>
    <script src="preview.js"></script>
</body>
</html>
